<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九界修真百科 - 用户登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: url('assets/images/background.jpeg') center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* 绿色雨滴动效层 */
        .rain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            background: linear-gradient(
                to bottom,
                rgba(0, 255, 128, 0) 0%,
                rgba(0, 255, 128, 0.6) 30%,
                rgba(0, 255, 128, 0.9) 50%,
                rgba(0, 255, 128, 0.6) 70%,
                rgba(0, 255, 128, 0) 100%
            );
            border-radius: 1px;
            opacity: 0;
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-100vh) translateX(0);
                opacity: 0;
            }
            5% {
                opacity: 0.8;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) translateX(20px);
                opacity: 0;
            }
        }

        /* 绿色光晕效果 */
        .green-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                rgba(0, 255, 128, 0.08) 0%,
                rgba(0, 200, 100, 0.05) 30%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 2;
            animation: glowPulse 6s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* 背景暗化层 */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 15, 0.5);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 48px 40px;
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.15),
                inset 0 -1px 1px rgba(0, 0, 0, 0.1),
                0 25px 60px rgba(0, 0, 0, 0.35);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #64ffda, #22d3ee, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #8892b0;
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #8892b0;
            font-weight: 500;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #ccd6f6;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.6;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.2));
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #64ffda;
            box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.15);
        }

        .input-wrapper input::placeholder {
            color: #5a6380;
        }

        .optional-text {
            font-size: 12px;
            color: #5a6380;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 6px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.25),
                0 12px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .message {
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 0.5px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 0.5px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            display: block;
        }

        .message.pending {
            background: rgba(251, 191, 36, 0.2);
            border: 0.5px solid rgba(251, 191, 36, 0.4);
            color: #fbbf24;
            display: block;
        }

        .admin-link {
            text-align: center;
            margin-top: 32px;
        }

        .admin-link a {
            color: #64ffda;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .admin-link a:hover {
            color: #22d3ee;
            text-decoration: underline;
        }

        /* 用户信息面板 */
        .user-panel {
            display: none;
            text-align: center;
        }

        .user-panel.show {
            display: block;
        }

        .user-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            object-position: center top;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .user-panel h2 {
            color: #ccd6f6;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .user-panel .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .status.authorized {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .user-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .user-info-item:last-child {
            border-bottom: none;
        }

        .user-info-item span:first-child {
            color: #8892b0;
            font-size: 14px;
        }

        .user-info-item span:last-child {
            color: #ccd6f6;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 0.5px solid rgba(239, 68, 68, 0.3);
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.3);
        }

        .btn-wiki {
            background: linear-gradient(135deg, #64ffda, #22d3ee);
            color: #1a1a2e;
            box-shadow: 0 6px 24px rgba(100, 255, 218, 0.3);
        }

        .btn-wiki:hover {
            box-shadow: 0 10px 40px rgba(100, 255, 218, 0.4);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 36px 24px;
                border-radius: 32px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景暗化层 -->
    <div class="dark-overlay"></div>
    
    <!-- 绿色雨滴动效 -->
    <div class="rain-overlay" id="rainOverlay"></div>
    
    <!-- 绿色光晕 -->
    <div class="green-glow"></div>
    
    <div class="container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">📖</div>
                <h1>九界修真百科</h1>
                <p>探索修真世界的无限奥秘</p>
            </div>
            
            <!-- 消息提示 -->
            <div id="message" class="message"></div>
            
            <!-- 用户面板（已登录） -->
            <div id="userPanel" class="user-panel">
                <img class="user-avatar" src="assets/images/河一.png" alt="河一">
                <h2 id="userName">用户名</h2>
                <span id="userStatus" class="status authorized">已授权</span>
                <div class="user-info">
                    <div class="user-info-item">
                        <span>注册时间</span>
                        <span id="userCreated">-</span>
                    </div>
                    <div class="user-info-item">
                        <span>邮箱</span>
                        <span id="userEmail">-</span>
                    </div>
                    <div class="user-info-item">
                        <span>手机号</span>
                        <span id="userPhone">-</span>
                    </div>
                </div>
                <button class="btn btn-wiki" onclick="goToWiki()">进入百科</button>
                <button class="btn btn-logout" onclick="logout()">退出登录</button>
            </div>
            
            <!-- 登录/注册表单 -->
            <div id="authForm">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('login')">登录</div>
                    <div class="tab" onclick="switchTab('register')">注册</div>
                </div>
                
                <!-- 登录表单 -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <span class="icon">👤</span>
                            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input type="password" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                
                <!-- 注册表单 -->
                <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名 <span style="color: #f87171;">*</span></label>
                        <div class="input-wrapper">
                            <span class="icon">👤</span>
                            <input type="text" id="regUsername" placeholder="3-20个字符" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码 <span style="color: #f87171;">*</span></label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input type="password" id="regPassword" placeholder="至少6位" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <div class="input-wrapper">
                            <span class="icon">📧</span>
                            <input type="email" id="regEmail" placeholder="选填">
                        </div>
                        <p class="optional-text">用于找回密码和接收通知</p>
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <div class="input-wrapper">
                            <span class="icon">📱</span>
                            <input type="tel" id="regPhone" placeholder="选填">
                        </div>
                        <p class="optional-text">用于接收审核通知</p>
                    </div>
                    <button type="submit" class="btn btn-primary">注册</button>
                </form>
            </div>
            
            <!-- 管理员入口 -->
            <div class="admin-link">
                <a href="admin.html">管理员登录</a>
            </div>
        </div>
    </div>
    
    <script src="assets/js/auth.js"></script>
    <script>
        let currentTab = 'login';

        // 检查是否已登录
        function checkAuth() {
            const user = getCurrentUser();
            if (user) {
                showUserPanel(user);
            }
        }

        // 显示用户面板
        function showUserPanel(user) {
            document.getElementById('authForm').style.display = 'none';
            document.getElementById('userPanel').classList.add('show');
            document.querySelector('.admin-link').style.display = 'none';
            updateUserInfo(user);
        }

        // 更新用户信息显示
        function updateUserInfo(user) {
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userCreated').textContent = new Date(user.created_at).toLocaleString('zh-CN');
            
            const statusEl = document.getElementById('userStatus');
            if (user.status === 'authorized') {
                statusEl.textContent = '已授权 ✓';
                statusEl.className = 'status authorized';
            } else if (user.status === 'pending') {
                statusEl.textContent = '待审核 ⏳';
                statusEl.style.background = 'rgba(251, 191, 36, 0.2)';
                statusEl.style.color = '#fbbf24';
            }

            document.getElementById('userEmail').textContent = user.email || '-';
            document.getElementById('userPhone').textContent = user.phone || '-';
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            hideMessage();
        }

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        // 隐藏消息
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        // 处理登录
        function handleLogin(e) {
            e.preventDefault();
            hideMessage();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const result = loginUser(username, password);
            
            if (result.success) {
                showUserPanel(result.user);
            } else {
                if (result.status === 'pending') {
                    showMessage(result.message, 'pending');
                } else {
                    showMessage(result.message, 'error');
                }
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            hideMessage();

            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;

            if (!username || !password) {
                showMessage('用户名和密码不能为空', 'error');
                return;
            }

            const result = registerUser(username, password, email, phone);
            
            if (result.success) {
                showMessage('注册成功！已自动授权，即将跳转到登录...', 'success');
                setTimeout(() => switchTab('login'), 2000);
            } else {
                showMessage(result.message || '注册失败', 'error');
            }
        }

        // 退出登录
        function logout() {
            logoutUser();
            location.reload();
        }

        // 进入百科
        function goToWiki() {
            window.location.href = 'index.html';
        }

        // 初始化雨滴效果
        function initRain() {
            const rainOverlay = document.getElementById('rainOverlay');
            const dropCount = 80;

            for (let i = 0; i < dropCount; i++) {
                createRainDrop(rainOverlay);
            }
        }

        function createRainDrop(container) {
            const drop = document.createElement('div');
            drop.className = 'rain-drop';
            
            const left = Math.random() * 100;
            const height = 15 + Math.random() * 40;
            const duration = 2 + Math.random() * 4;
            const delay = Math.random() * 8;
            const opacity = 0.3 + Math.random() * 0.5;
            
            drop.style.left = `${left}%`;
            drop.style.height = `${height}px`;
            drop.style.animationDuration = `${duration}s`;
            drop.style.animationDelay = `${delay}s`;
            drop.style.opacity = opacity;
            
            const greenHue = 120 + Math.random() * 40;
            const saturation = 70 + Math.random() * 30;
            const lightness = 40 + Math.random() * 30;
            drop.style.background = `linear-gradient(
                to bottom,
                hsla(${greenHue}, ${saturation}%, ${lightness}%, 0) 0%,
                hsla(${greenHue}, ${saturation}%, ${lightness}%, 0.7) 30%,
                hsla(${greenHue}, ${saturation}%, ${lightness}%, 0.9) 50%,
                hsla(${greenHue}, ${saturation}%, ${lightness}%, 0.7) 70%,
                hsla(${greenHue}, ${saturation}%, ${lightness}%, 0) 100%
            )`;
            
            container.appendChild(drop);
            
            drop.addEventListener('animationiteration', () => {
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.animationDuration = `${2 + Math.random() * 4}s`;
            });
        }

        // 初始化
        checkAuth();
        initRain();
    </script>
</body>
</html>
