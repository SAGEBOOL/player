<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音预览 - 云希（男声沉稳）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="bg-white bg-opacity-10 backdrop-filter blur-20px p-8 rounded-2xl text-center" style="border: 1px solid rgba(255,255,255,0.2);">
        <h1 class="text-2xl font-bold text-white mb-4">🎙️ 语音预览</h1>
        <p class="text-gray-300 mb-2">音色：云希（男声，沉稳）</p>
        <p class="text-sm text-gray-400 mb-6">预览文本："我叫河一，却连一口灵泉都没见过。但我不认命。"</p>
        
        <audio controls class="mx-auto mb-6" style="filter: hue-rotate(120deg);">
            <source src="assets/music/preview-yunxi.mp3" type="audio/mpeg">
            您的浏览器不支持 audio 标签。
        </audio>
        
        <div class="space-y-3">
            <p class="text-sm text-gray-400">如果声音合适，我可以继续生成完整章节的MP3</p>
            <button onclick="window.close()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm">
                关闭预览
            </button>
        </div>
    </div>
</body>
</html>
